<svg width="1440" height="420" viewBox="0 0 1440 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1440" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F3E8"/>
      <stop offset="1" stop-color="#E7F0EE"/>
    </linearGradient>
    <radialGradient id="coral" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1148 88) rotate(132.91) scale(325.201 214.441)">
      <stop stop-color="#F5A272" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#F5A272" stop-opacity="0"/>

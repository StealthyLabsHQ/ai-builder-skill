<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Starter Tool</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <header>
      <p class="eyebrow">Starter</p>
      <h1>Browser Tool</h1>
      <p>Replace this text with the job the tool actually solves.</p>
    </header>

    <section class="panel">
      <label for="input-text">Input</label>
      <textarea id="input-text" rows="8" placeholder="Paste source data here"></textarea>
      <button id="run-button" type="button">Run</button>
    </section>

    <section class="panel">
      <h2>Output</h2>
      <pre id="output-text">Results appear here.</pre>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>

name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate repository structure and local links
        run: python scripts/validate_repo.py

      - name: Validate routing evaluation cases
        run: python scripts/check_eval_cases.py

      - name: Compile validation scripts
        run: python -m py_compile scripts/*.py
